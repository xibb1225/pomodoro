<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍅 番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Mode tabs -->
    <div class="mode-tabs" style="margin-top: 12px;">
      <button class="mode-tab active" data-mode="work">🍅 专注</button>
      <button class="mode-tab" data-mode="shortBreak">☕ 小休</button>
      <button class="mode-tab" data-mode="longBreak">🌿 长休</button>
    </div>

    <!-- Timer -->
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 240 240">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <linearGradient id="gradient-work" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E04D4D"/>
            <stop offset="100%" stop-color="#FF6B6B"/>
          </linearGradient>
          <linearGradient id="gradient-short" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4ECDC4"/>
            <stop offset="100%" stop-color="#44B5AD"/>
          </linearGradient>
          <linearGradient id="gradient-long" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C8CE0"/>
            <stop offset="100%" stop-color="#6C7CD8"/>
          </linearGradient>
        </defs>

        <!-- Background track -->
        <circle class="ring-bg"
                cx="120" cy="120" r="100"
                fill="none"
                stroke="rgba(255,255,255,0.08)"
                stroke-width="6"/>

        <!-- Progress arc -->
        <circle class="ring-progress"
                cx="120" cy="120" r="100"
                fill="none"
                stroke="url(#gradient-work)"
                stroke-width="6"
                stroke-linecap="round"
                stroke-dasharray="628.32"
                stroke-dashoffset="0"
                filter="url(#glow)"
                transform="rotate(-90 120 120)"/>
      </svg>

      <!-- Digital readout -->
      <div class="timer-text">
        <span class="timer-minutes">25</span>
        <span class="timer-separator">:</span>
        <span class="timer-seconds">00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-control btn-start" id="btnStart" title="开始 (Space)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <button class="btn-control btn-pause hidden" id="btnPause" title="暂停 (Space)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="btn-control btn-reset" id="btnReset" title="重置 (R)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <polyline points="23 20 23 14 17 14"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>

    <!-- Skip -->
    <button class="btn-skip" id="btnSkip">跳过 → 下一阶段</button>

    <!-- Session stats -->
    <div class="session-info">
      <div class="session-count">
        <span class="session-label">今日番茄</span>
        <span class="session-number" id="sessionCount">0</span>
        <span class="session-unit">个</span>
      </div>
      <div class="session-tomatoes" id="sessionTomatoes"></div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <label class="pin-toggle" title="窗口置顶 (⇧⌘T)">
        <input type="checkbox" id="pinToggle" checked>
        <span class="pin-icon">📌</span>
        <span class="pin-label">置顶</span>
      </label>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
